<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesse James - UX 五要素全解析</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN (用於瀏覽器解析 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 模擬 Lucide 圖示組件
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(0);

            const elements = [
                { id: 4, name: '表現層 (Surface)', eng: 'Surface', icon: 'palette', color: 'bg-indigo-600', textColor: 'text-indigo-600', desc: '視覺設計、配色、字體與感知傳達。', questions: '產品看起來與感覺起來如何？', focus: '視覺、美感、品牌感', outputs: ['UI 設計稿', '視覺規範'], delivery: '品牌色調、高質感食物照、圓角親和按鈕。', book: '大地色系、文青風格字體、醒目購買鈕。' },
                { id: 3, name: '框架層 (Skeleton)', eng: 'Skeleton', icon: 'layout', color: 'bg-indigo-50', textColor: 'text-indigo-500', bgColor: 'bg-indigo-500', desc: '頁面佈局、元件擺放與導航設計。', questions: '元件如何排版以優化操作？', focus: '介面佈局、導航引導', outputs: ['Wireframe', '資訊分層'], delivery: '結帳鈕置底、進度條顯示。', book: '立即購買鈕固定、搜尋列置頂。' },
                { id: 2, name: '結構層 (Structure)', eng: 'Structure', icon: 'share-2', color: 'bg-indigo-400', textColor: 'text-indigo-400', bgColor: 'bg-indigo-400', desc: '交互邏輯、流程設計與資訊架構。', questions: '使用者如何完成任務？', focus: '流程邏輯、資訊分類', outputs: ['User Flow', 'Site Map'], delivery: '點擊加入後跳出規格窗，符合點餐習慣。', book: '賣書流程：掃描 -> 編輯 -> 上傳。' },
                { id: 1, name: '範圍層 (Scope)', eng: 'Scope', icon: 'list-todo', color: 'bg-indigo-300', textColor: 'text-indigo-300', bgColor: 'bg-indigo-300', desc: '功能規格與內容需求定義。', questions: '需要哪些具體功能？', focus: '功能清單、內容規格', outputs: ['PRD', '內容表格'], delivery: '餐廳搜尋、即時追蹤、評價系統。', book: 'ISBN 掃描、關鍵字搜尋、類別篩選。' },
                { id: 0, name: '策略層 (Strategy)', eng: 'Strategy', icon: 'target', color: 'bg-indigo-200', textColor: 'text-indigo-200', bgColor: 'bg-indigo-200', desc: '商業目標與使用者需求的地基。', questions: '為什麼要做？誰要用？', focus: '商業價值、用戶痛點', outputs: ['Persona', '商業計劃'], delivery: '目標：增加市佔；用戶：忙碌時快速吃到餐。', book: '目標：二手書市集；用戶：簡單賣、便宜買。' }
            ];

            const active = elements.find(e => e.id === activeTab);

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-bold text-indigo-900 mb-2">Jesse James 的 UX 五要素全解析</h1>
                        <p className="text-gray-600">「下層決策限制上層，上層變動源於下層不穩」</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-5 flex flex-col items-center">
                            <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">具體 (Concrete) ↓</div>
                            <div className="w-full space-y-2">
                                {elements.slice(0).reverse().map((el) => (
                                    <button
                                        key={el.id}
                                        onClick={() => setActiveTab(el.id)}
                                        className={`w-full transition-all duration-300 transform rounded-lg p-4 flex items-center gap-4 border-l-4 shadow-sm ${
                                            activeTab === el.id 
                                            ? `${el.id === 3 ? 'bg-indigo-500' : el.bgColor || el.color} text-white scale-105 border-white shadow-lg` 
                                            : 'bg-white border-indigo-100 text-gray-600 hover:bg-gray-50'
                                        }`}
                                    >
                                        <Icon name={el.icon} className="w-6 h-6" />
                                        <div className="text-left">
                                            <div className="text-xs opacity-70 font-semibold">{el.eng}</div>
                                            <div className="text-lg font-bold leading-tight">{el.name}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                            <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-4">↑ 抽象 (Abstract)</div>
                        </div>

                        <div className="lg:col-span-7 space-y-6">
                            <div className="bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
                                <div className="flex items-center gap-4 mb-4">
                                    <div className={`p-3 rounded-xl ${active.id === 3 ? 'bg-indigo-500' : active.bgColor || active.color} text-white`}>
                                        <Icon name={active.icon} className="w-8 h-8" />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-900">{active.name}</h2>
                                        <p className="text-indigo-500 font-medium">{active.questions}</p>
                                    </div>
                                </div>
                                <p className="text-gray-600 mb-6">{active.desc}</p>
                                <div className="grid grid-cols-2 gap-4 border-t pt-4 text-sm">
                                    <div><div className="font-bold text-gray-400 uppercase mb-1">核心重點</div><div className="text-indigo-900 font-bold">{active.focus}</div></div>
                                    <div><div className="font-bold text-gray-400 uppercase mb-1">常見產出</div><div className="flex flex-wrap gap-1">{active.outputs.map(o => <span key={o} className="bg-gray-100 px-1.5 py-0.5 rounded text-xs">{o}</span>)}</div></div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                                <h3 className="font-bold mb-4 flex items-center gap-2"><span className="w-1 h-5 bg-indigo-500 rounded"></span> 案例應用</h3>
                                <div className="space-y-3">
                                    <div className="p-3 bg-orange-50 rounded-lg border border-orange-100 text-sm">
                                        <div className="font-bold text-orange-800 mb-1">🍔 美食外送 App</div>
                                        <div className="text-gray-700">{active.delivery}</div>
                                    </div>
                                    <div className="p-3 bg-emerald-50 rounded-lg border border-emerald-100 text-sm">
                                        <div className="font-bold text-emerald-800 mb-1">📚 二手書交易平台</div>
                                        <div className="text-gray-700">{active.book}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
